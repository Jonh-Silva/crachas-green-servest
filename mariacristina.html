<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validação de Colaborador</title>
    <style>
        body { user-select: none; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; text-align: center; }
        
        /* O segredo: o topo do card fica verde para receber o logo branco */
        .card { max-width: 300px; margin: 0 auto; background: white; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); overflow: hidden; }
       .card-header { 
    background: #016138; /* Cor exata do fundo da sua logo */ 
    padding: 25px 15px; 
    display: flex;
    justify-content: center;
    align-items: center;
}

.logo-servest { 
    max-width: 150px; /* Aumentei um pouco para dar mais destaque */
    height: auto;
    display: block;
}
        .profile-pic { width: 110px; height: 110px; border-radius: 50%; object-fit: cover; border: 3px solid #28a745; margin-top: -55px; /* Foto "sobe" para encostar no header */ }

        .status-active { display: block; background: #28a745; color: white; padding: 10px; border-radius: 5px; font-weight: bold; font-size: 0.9em; margin-bottom: 20px; }
        .label { font-weight: bold; color: #555; font-size: 0.8em; }
        .value { color: #222; font-size: 1.1em; display: block; margin-bottom: 15px; }
        
        .watermark { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-45deg); font-size: 40px; color: rgba(0,0,0,0.05); pointer-events: none; z-index: 10; }
        .verificacao { font-size: 0.7em; color: #777; margin-top: 10px; }
    </style>
</head>
<body oncontextmenu="return false">

    <div class="card">
        <div class="card-header">
            <img src="logo-green.png" alt="GREEN SERVEST" class="logo-servest">
        </div>

        <div class="card-body">
            <img src="mariacristina.png" alt="Sem Foto" class="profile-pic">

            <h3 style="color: #333; margin: 20px 0;">Dados do Colaborador</h3>

            <div class="status-active">CADASTRO ATIVO</div>

            <div>
                <span class="label">ID / MATRÍCULA:</span>
                <span class="value">114</span>
            </div>
            <div>
                <span class="label">NOME COMPLETO:</span>
                <span class="value">Maria Cristina de Lara</span>
            </div>
            <div>
                <span class="label">CARGO:</span>
                <span class="value"> Auxiliar de Serviços Gerais</span>
            </div>
            
 <div class="info-group">
            <span class="label">Departamento:</span>
            <span class="value">Operacional</span> </div>
            
            <div class="verificacao" id="data-check">Verificando...</div>
        </div>
        <div class="watermark">CÓPIA PROIBIDA</div>
    </div>

 <script>
    // --- CONTROLE DE SESSÃO ÚNICA GREEN SERVEST ---
    const tempoSessao = 60; // 60 segundos
    
    function gerenciarAcesso() {
        // Verifica se esta aba já expirou anteriormente
        if (sessionStorage.getItem("status_sessao") === "expirado") {
            bloquearImediatamente();
            return;
        }

        // Se for a primeira vez abrindo, inicia a contagem
        let tempoRestante = tempoSessao;
        const contador = setInterval(() => {
            tempoRestante--;

            if (tempoRestante <= 0) {
                clearInterval(contador);
                // Marca esta aba como expirada permanentemente no navegador
                sessionStorage.setItem("status_sessao", "expirado");
                bloquearImediatamente();
            }
        }, 1000);
    }

    function bloquearImediatamente() {
        document.body.innerHTML = `
            <div style="padding: 60px 20px; text-align: center; font-family: sans-serif; background: #fff; height: 100vh;">
                <div style="font-size: 70px;">🚫</div>
                <h1 style="color: #d32f2f; margin-top: 20px;">SESSÃO ENCERRADA</h1>
                <p style="color: #666; font-size: 1.1em;">Por segurança, este link expirou e foi bloqueado.</p>
                <p style="color: #28a745; font-weight: bold; margin-top: 20px;">Você precisa ESCANEAR O QR CODE FÍSICO novamente para validar o acesso.</p>
                <hr style="width: 50px; margin: 30px auto; border: 1px solid #eee;">
                <p style="color: #999; font-size: 0.8em;"><b>GREEN SERVEST</b><br>Proteção de Dados em Tempo Real</p>
            </div>
        `;
    }

    // --- RELÓGIO E SEGURANÇA ---
    function atualizarRelogio() {
        if (sessionStorage.getItem("status_sessao") === "expirado") return;
        const agora = new Date();
        const campoData = document.getElementById('data-check');
        if (campoData) campoData.innerText = "Verificado em: " + agora.toLocaleString('pt-BR');
    }

    window.onload = function() {
        gerenciarAcesso();
        setInterval(atualizarRelogio, 1000);
        atualizarRelogio();
    };

    // Bloqueios Anti-Print
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', e => {
        if (e.key === "PrintScreen" || (e.ctrlKey && (e.key === 'p' || e.key === 's'))) e.preventDefault();
    });
</script>
    
</body>
</html>
