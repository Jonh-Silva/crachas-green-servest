<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validação de Colaborador</title>
    <style>
        /* Estilos para o Card */
        body { user-select: none; -webkit-user-select: none; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); width: 300px; border-top: 10px solid #004a99; position: relative; }
        .info-group { text-align: left; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .label { font-weight: bold; color: #004a99; font-size: 0.85em; text-transform: uppercase; }
        .value { color: #333; font-size: 1.1em; display: block; margin-top: 2px; }
        .status-badge { display: block; text-align: center; padding: 8px; border-radius: 5px; background: #28a745; color: white; font-weight: bold; margin-top: 20px; }
        .watermark { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-45deg); font-size: 35px; color: rgba(0,0,0,0.03); pointer-events: none; white-space: nowrap; }
    </style>
</head>
<body oncontextmenu="return false">

    <div class="card">
        <div class="watermark">CÓPIA PROIBIDA</div>
        
        <div style="text-align: center; margin-bottom: 20px;">
            <img src="lucas.png.png" style="width: 110px; height: 110px; border-radius: 50%; object-fit: cover; border: 3px solid #28a745;">
        </div>

        <h3 style="text-align: center; color: #555; margin-top: 0;">Dados do Colaborador</h3>

        <div class="info-group">
            <span class="label">ID / Matrícula:</span>
            <span class="value">175</span> </div>

        <div class="info-group">
            <span class="label">Nome Completo:</span>
            <span class="value">Lucas Miranda de Assis</span> </div>

        <div class="info-group">
            <span class="label">Departamento:</span>
            <span class="value">Administrativo</span> </div>

        <div class="info-group">
            <span class="label">Cargo:</span>
            <span class="value">Gestor Operacional</span> </div>

        <div class="status-badge">CADASTRO ATIVO</div>

        <p style="font-size: 10px; color: #aaa; text-align: center; margin-top: 15px;">
            Verificado em: <span id="data-check"></span>
        </p>
    </div>

  <script>
    // 1. Mostra a data e hora atualizada do acesso
    document.getElementById('data-check').innerText = new Date().toLocaleString('pt-BR');

    // 2. Bloqueia o Botão Direito do Mouse
    document.addEventListener('contextmenu', event => event.preventDefault());

    // 3. Bloqueia Atalhos de Teclado (PrintScreen, Ctrl+S, Ctrl+P, Ctrl+U)
    document.addEventListener('keydown', function(e) {
        if (
            e.key === "PrintScreen" || 
            (e.ctrlKey && (e.key === 'p' || e.key === 's' || e.key === 'u' || e.key === 'shift' || e.key === 'i'))
        ) {
            e.preventDefault();
            alert('Ação bloqueada por segurança.');
        }
    });

    // 4. "Limpa" a área de transferência se ele tentar dar Print
    document.addEventListener('keyup', (e) => {
        if (e.key === "PrintScreen") {
            navigator.clipboard.writeText('');
            alert('Print Screen desativado neste documento.');
        }
    });
</script>
</body>
</html>
